<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sakura Skin Preview</title>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: monospace; color: #ccc; gap: 12px; }
  h2 { margin: 0; font-size: 14px; color: #aaa; }

  /* ── Simulate GamePadViewer's DS4 base layout ── */
  .controller.ds4.edit {
    position: relative;
    width: 806px;
    height: 598px;
    background-repeat: no-repeat;
    background-size: 100% 100%;
    flex-shrink: 0;
  }
  .controller.ds4.edit > div { position: absolute; }

  /* default DS4 container positions (from GamePadViewer source) */
  .triggers  { top: 56px;  left: 72px;  width: 588px; height: 90px; }
  .bumpers   { top: 143px; left: 65px;  width: 588px; height: 23px; }
  .touchpad  { top: 122px; left: 272px; width: 262px; height: 151px; }
  .arrows    { top: 142px; left: 227px; width: 352px; height: 46px; }
  .abxy      { top: 193px; left: 539px; width: 170px; height: 171px; }
  .dpad      { top: 204px; left: 134px; width: 125px; height: 126px; }
  .sticks    { top: 313px; left: 205px; width: 361px; height: 105px; }
  .meta      { bottom: 216px; left: 382px; width: 42px; height: 42px; }

  .trigger.left  { float: left;  width: 99px; height: 100%; }
  .trigger.right { float: right; width: 99px; height: 100%; }
  .bumper.left   { float: left;  margin-left: 91px; width: 99px; height: 23px; }
  .bumper.right  { float: right; width: 99px; height: 23px; }

  .stick { position: absolute; }
  .stick.left  { top: 0;   left: 38px; width: 94px; height: 94px; }
  .stick.right { top: calc(100% - 105px); left: calc(100% - 105px); width: 94px; height: 94px; }

  .face { position: absolute; }
  .face.up    { width: 36px; height: 52px; left: 41px; top: 6px;    }
  .face.down  { width: 36px; height: 52px; left: 41px; bottom: 5px; }
  .face.left  { width: 52px; height: 36px; top: 45px;  left: 0;     }
  .face.right { width: 52px; height: 36px; top: 45px;  right: 0;    }

  .button { position: absolute; width: 55px; height: 55px; }
  .a { bottom: 16px; left: 48px; }
  .b { top: 49px;    right: 17px; }
  .x { top: 50px;    left: 0; }
  .y { left: 50px;   top: 0; }

  /* debug outlines */
  .debug .triggers  { outline: 1px dashed #f006; }
  .debug .bumpers   { outline: 1px dashed #0f06; }
  .debug .touchpad  { outline: 1px dashed #0ff6; }
  .debug .arrows    { outline: 1px dashed #ff06; }
  .debug .abxy      { outline: 1px dashed #f0f6; }
  .debug .dpad      { outline: 1px dashed #f806; }
  .debug .sticks    { outline: 1px dashed #08f6; }
  .debug .stick     { outline: 2px solid #08f; }
  .debug .face      { outline: 2px solid #f80; }
  .debug .button    { outline: 2px solid #f0f; }
  .debug .meta      { outline: 2px solid #ff0; }
  .debug .trigger   { outline: 1px solid #f00; }
  .debug .bumper    { outline: 1px solid #0f0; }

  /* ── Your skin CSS (loaded inline) ── */
</style>
<link rel="stylesheet" href="edit-v7.css">
<style>
  /* Controls */
  #controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
  button { background: #333; color: #ccc; border: 1px solid #555; padding: 6px 14px; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 12px; }
  button:hover { background: #444; }
  button.active { background: #555; border-color: #888; }
  label { font-size: 12px; }
  select { background: #333; color: #ccc; border: 1px solid #555; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 12px; }
  #coords { font-size: 11px; color: #888; min-width: 160px; }
</style>
</head>
<body>

<h2>Sakura Skin Preview — hover controller to see coordinates</h2>

<div id="controls">
  <button id="btnDebug" onclick="toggleDebug()">Toggle Debug Outlines</button>
  <button onclick="togglePressed('dpad')">Toggle D-pad Pressed</button>
  <button onclick="togglePressed('sticks')">Toggle Sticks Pressed</button>
  <button onclick="togglePressed('buttons')">Toggle Buttons Pressed</button>
  <span id="coords">x: — y: —</span>
</div>

<div class="controller ds4 edit" id="ctrl">

  <!-- Triggers -->
  <div class="triggers">
    <div class="trigger left" id="tl"></div>
    <div class="trigger right" id="tr"></div>
  </div>

  <!-- Bumpers -->
  <div class="bumpers">
    <div class="bumper left" id="bl"></div>
    <div class="bumper right" id="br"></div>
  </div>

  <!-- Touchpad -->
  <div class="touchpad" id="tp"></div>

  <!-- Share/Options -->
  <div class="arrows">
    <div class="back button" id="back"></div>
    <div class="start button" id="start"></div>
  </div>

  <!-- Face buttons -->
  <div class="abxy">
    <div class="button a" id="ba"></div>
    <div class="button b" id="bb"></div>
    <div class="button x" id="bx"></div>
    <div class="button y" id="by"></div>
  </div>

  <!-- D-pad -->
  <div class="dpad">
    <div class="face up" id="dup"></div>
    <div class="face down" id="ddown"></div>
    <div class="face left" id="dleft"></div>
    <div class="face right" id="dright"></div>
  </div>

  <!-- Sticks -->
  <div class="sticks">
    <div class="stick left" id="sl"></div>
    <div class="stick right" id="sr"></div>
  </div>

  <!-- PS button -->
  <div class="meta" id="meta"></div>

</div>

<script>
  let debugOn = false;
  let pressedState = {};

  function toggleDebug() {
    debugOn = !debugOn;
    document.getElementById('ctrl').classList.toggle('debug', debugOn);
    document.getElementById('btnDebug').classList.toggle('active', debugOn);
  }

  function togglePressed(group) {
    pressedState[group] = !pressedState[group];
    const on = pressedState[group];
    if (group === 'dpad') {
      ['dup','ddown','dleft','dright'].forEach(id => document.getElementById(id).classList.toggle('pressed', on));
    } else if (group === 'sticks') {
      ['sl','sr'].forEach(id => document.getElementById(id).classList.toggle('pressed', on));
    } else if (group === 'buttons') {
      ['ba','bb','bx','by','tl','tr','bl','br','tp','back','start','meta'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('pressed', on);
      });
    }
  }

  // Show mouse coords relative to controller
  const ctrl = document.getElementById('ctrl');
  const coordsEl = document.getElementById('coords');
  ctrl.addEventListener('mousemove', e => {
    const r = ctrl.getBoundingClientRect();
    const x = Math.round(e.clientX - r.left);
    const y = Math.round(e.clientY - r.top);
    coordsEl.textContent = `x: ${x}  y: ${y}`;
  });
  ctrl.addEventListener('mouseleave', () => { coordsEl.textContent = 'x: —  y: —'; });
</script>

</body>
</html>
