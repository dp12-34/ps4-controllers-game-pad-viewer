<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 806 598">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#df6fa2" stop-opacity=".58"/>
      <stop offset="34%" stop-color="#f4b8d1" stop-opacity=".38"/>
      <stop offset="62%" stop-color="#fff2f8" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity=".03"/>
    </linearGradient>

    <g id="petal">
      <path d="M0,-11 C7,-11 12,-4 9,4 C6,12 -3,16 -8,8 C-13,0 -7,-10 0,-11Z" fill="#eb78a8"/>
      <path d="M0,-8 C3,-4 2,4 -1,9" stroke="#b74a78" stroke-width="1" opacity=".35" fill="none"/>
    </g>

    <g id="blossom">
      <use href="#petal" transform="rotate(0) translate(0,-9) scale(.58)"/>
      <use href="#petal" transform="rotate(72) translate(0,-9) scale(.58)"/>
      <use href="#petal" transform="rotate(144) translate(0,-9) scale(.58)"/>
      <use href="#petal" transform="rotate(216) translate(0,-9) scale(.58)"/>
      <use href="#petal" transform="rotate(288) translate(0,-9) scale(.58)"/>
      <circle r="2.8" fill="#ba4777"/>
      <circle r="1.1" fill="#ffe1ec"/>
    </g>
  </defs>

  <!-- blush fade clipped visually to controller region; transparent elsewhere -->
  <path d="M96 120 C58 134 44 171 42 227 L25 418 C18 498 67 550 139 539 C189 532 203 486 218 444 C230 411 247 393 283 396 L523 396 C559 393 576 411 588 444 C603 486 617 532 667 539 C739 550 788 498 781 418 L764 227 C762 171 748 134 710 120 C651 99 596 122 559 175 C536 206 507 219 464 219 L342 219 C299 219 270 206 247 175 C210 122 155 99 96 120Z"
        fill="url(#fade)" opacity=".95"/>

  <!-- upper-left branch cluster -->
  <path d="M96 180 C134 145 178 140 224 158 C250 168 270 186 287 208"
        stroke="#5c3839" stroke-width="8" stroke-linecap="round" fill="none" opacity=".52"/>
  <path d="M122 160 C104 144 94 128 88 111" stroke="#5c3839" stroke-width="4" stroke-linecap="round" fill="none" opacity=".42"/>
  <path d="M181 144 C193 126 207 115 224 105" stroke="#5c3839" stroke-width="4" stroke-linecap="round" fill="none" opacity=".42"/>
  <use href="#blossom" x="119" y="172" transform="rotate(-20 119 172) scale(1.15)"/>
  <use href="#blossom" x="163" y="149" transform="rotate(8 163 149) scale(.72)"/>
  <use href="#blossom" x="218" y="159" transform="rotate(-18 218 159) scale(.66)"/>
  <use href="#petal" x="269" y="186" transform="rotate(-20 269 186) scale(.62)"/>
  <use href="#petal" x="242" y="139" transform="rotate(40 242 139) scale(.45)"/>

  <!-- lower-right branch cluster -->
  <path d="M540 404 C584 437 629 449 679 437 C716 429 741 407 759 379"
        stroke="#5c3839" stroke-width="8" stroke-linecap="round" fill="none" opacity=".47"/>
  <path d="M630 445 C615 468 596 484 576 493" stroke="#5c3839" stroke-width="4" stroke-linecap="round" fill="none" opacity=".40"/>
  <path d="M700 431 C724 447 738 468 746 492" stroke="#5c3839" stroke-width="4" stroke-linecap="round" fill="none" opacity=".40"/>
  <use href="#blossom" x="560" y="407" transform="rotate(18 560 407) scale(.95)"/>
  <use href="#blossom" x="620" y="448" transform="rotate(-10 620 448) scale(.72)"/>
  <use href="#blossom" x="684" y="435" transform="rotate(20 684 435) scale(.58)"/>

  <!-- small center accents -->
  <use href="#petal" x="398" y="171" transform="rotate(70 398 171) scale(.48)" opacity=".75"/>
  <use href="#petal" x="470" y="312" transform="rotate(-36 470 312) scale(.42)" opacity=".60"/>
  <use href="#blossom" x="598" y="305" transform="rotate(15 598 305) scale(.48)" opacity=".78"/>
</svg>
